apiVersion: v1
kind: ServiceAccount
metadata:
  name: openops-reader
  namespace: openops-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openops-reader
  namespace: openops-lab
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["readiness-demo"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openops-reader
  namespace: openops-lab
subjects:
  - kind: ServiceAccount
    name: openops-reader
    namespace: openops-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openops-reader

apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-demo
  namespace: openops-lab
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: readiness-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: readiness-demo
    spec:
      containers:
        - name: web
          image: nginx:1.27.5-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /ready
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 1
